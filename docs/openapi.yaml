openapi: 3.0.3
info:
  title: Unoapi Cloud API
  version: 1.0.0
  description: REST API compatible with WhatsApp Cloud using Baileys as transport.
servers:
  - url: http://localhost:9876
paths:
  /ping:
    get:
      summary: Healthcheck
      responses:
        '200':
          description: pong
          content:
            text/plain:
              schema:
                type: string

  /session/{phone}:
    get:
      summary: Session UI (QR/Config)
      parameters:
        - in: path
          name: phone
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HTML UI
          content:
            text/html:
              schema:
                type: string

  /v15.0/{phone}/messages:
    post:
      summary: Send message (Cloud API shape)
      description: On SendError, API may still respond 200 with an OK envelope while a failed payload is sent to the configured webhook.
      parameters:
        - in: path
          name: phone
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
            examples:
              text:
                summary: Simple text
                value:
                  messaging_product: whatsapp
                  to: "5511999999999"
                  type: text
                  text:
                    body: "Hello from Unoapi Cloud!"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                textOk:
                  summary: Text response
                  value:
                    messaging_product: whatsapp
                    contacts:
                      - wa_id: "5511999999999"
                    messages:
                      - id: "wamid.HBg..."
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
              examples:
                invalid:
                  summary: Invalid parameters
                  value:
                    status: error
                    message: "invalid_phone_number: 551199..."

  /{phone}/contacts:
    post:
      summary: Validate contacts (standalone)
      parameters:
        - in: path
          name: phone
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactsRequest'
            example:
              blocking: no_wait
              contacts:
                - "16315551000"
              force_check: true
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactsResponse'
              example:
                contacts:
                  - wa_id: "16315551000"
                    input: "16315551000"
                    status: valid

  /webhooks/fake/{phone}:
    post:
      summary: Fake webhook receiver (testing)
      description: 'Accepts any payload and replies { "success": true }.'
      parameters:
        - in: path
          name: phone
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/WebhookStatusFailed'
                - $ref: '#/components/schemas/WebhookInbound'
                - $ref: '#/components/schemas/WebhookAck'
                - type: object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                example:
                  success: true

components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: Authorization
      description: 'API token header. Example: 1 or Bearer <token>'
  schemas:
    Error400:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string

    MessageRequest:
      type: object
      required: [messaging_product, to, type]
      properties:
        messaging_product:
          type: string
          example: whatsapp
        to:
          type: string
          description: Destination phone number or group JID
        type:
          type: string
          description: Content type (text, image, video, document, ...)
        text:
          type: object
          properties:
            body:
              type: string
        image:
          type: object
          properties:
            link:
              type: string
            caption:
              type: string
        video:
          type: object
          properties:
            link:
              type: string
            caption:
              type: string
        options:
          type: object
          properties:
            broadcast:
              type: boolean

    MessageResponse:
      type: object
      properties:
        messaging_product:
          type: string
        contacts:
          type: array
          items:
            type: object
            properties:
              wa_id:
                type: string
        messages:
          type: array
          items:
            type: object
            properties:
              id:
                type: string

    ContactsRequest:
      type: object
      properties:
        blocking:
          type: string
          example: no_wait
        contacts:
          type: array
          items:
            type: string
        force_check:
          type: boolean

    ContactsResponse:
      type: object
      properties:
        contacts:
          type: array
          items:
            type: object
            properties:
              wa_id:
                type: string
              input:
                type: string
              status:
                type: string

    WebhookStatusFailed:
      description: Failed status payload posted to webhook (outside HTTP response)
      type: object
      properties:
        object:
          type: string
          example: whatsapp_business_account
        entry:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              changes:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                      example: messages
                    value:
                      type: object
                      properties:
                        messaging_product:
                          type: string
                          example: whatsapp
                        metadata:
                          type: object
                          properties:
                            display_phone_number:
                              type: string
                            phone_number_id:
                              type: string
                        statuses:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              recipient_id:
                                type: string
                              status:
                                type: string
                                example: failed
                              timestamp:
                                type: integer
                              errors:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    code:
                                      type: integer
                                    title:
                                      type: string

    WebhookInbound:
      description: Inbound messages (compatible with WhatsApp Cloud API shape)
      type: object
      properties:
        object:
          type: string
        entry:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              changes:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                      example: messages
                    value:
                      type: object
                      properties:
                        messaging_product:
                          type: string
                          example: whatsapp
                        metadata:
                          type: object
                        contacts:
                          type: array
                          items:
                            type: object
                        messages:
                          type: array
                          items:
                            type: object

    WebhookAck:
      description: Acks/Statuses for sent messages (delivered/read/deleted)
      type: object
      properties:
        object:
          type: string
        entry:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              changes:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                      example: messages
                    value:
                      type: object
                      properties:
                        messaging_product:
                          type: string
                        statuses:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              recipient_id:
                                type: string
                              status:
                                type: string
                                example: delivered
                              timestamp:
                                type: integer

